site_name: PalmScript
site_description: PalmScript language documentation, reference, and examples
site_url: !ENV [DOCS_SITE_URL, "https://palmscript.dev/docs/"]
site_dir: ../../site
theme:
  name: material
  logo: brand/palmscript-logo.png
  favicon: brand/favicon.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  homepage: https://palmscript.dev/
  alternate:
    - name: English
      link: /docs/
      lang: en
    - name: Espanol
      link: /es/docs/
      lang: es
    - name: Portugues (Brasil)
      link: /pt-BR/docs/
      lang: pt-BR
    - name: Deutsch
      link: /de/docs/
      lang: de
    - name: 日本語
      link: /ja/docs/
      lang: ja

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header-home.js

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - i18n:
      build_only_locale: !ENV [BUILD_ONLY_LOCALE, null]
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: /docs/
          fixed_link: https://palmscript.dev/docs/
        - locale: es
          name: Espanol
          build: true
          link: /es/docs/
          fixed_link: https://palmscript.dev/es/docs/
          site_url: https://palmscript.dev/es/docs/
