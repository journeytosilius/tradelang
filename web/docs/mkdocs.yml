site_name: PalmScript
site_description: PalmScript language documentation, reference, and examples
site_url: !ENV [DOCS_SITE_URL, "https://palmscript.dev/docs/"]
site_dir: ../../site
theme:
  name: material
  logo: brand/palmscript-logo.png
  favicon: brand/favicon.png
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  homepage: https://palmscript.dev/
  alternate:
    - name: English
      link: /docs/
      lang: en
    - name: Espanol
      link: /es/docs/
      lang: es

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/header-home.js

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search
  - i18n:
      build_only_locale: !ENV [BUILD_ONLY_LOCALE, null]
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
          link: /docs/
          fixed_link: https://palmscript.dev/docs/
        - locale: es
          name: Espanol
          build: true
          link: /es/docs/
          fixed_link: https://palmscript.dev/es/docs/
          site_url: https://palmscript.dev/es/docs/
          site_description: Documentacion del lenguaje PalmScript, referencia y ejemplos
          nav_translations:
            Home: Inicio
            Learn: Aprende
            Overview: Resumen
            Installation: Instalacion
            Quickstart: Inicio Rapido
            First Strategy: Primera Estrategia
            Language Overview: Resumen Del Lenguaje
            Cookbook: Recetario
            Multi-Interval Strategy: Estrategia Multi-Intervalo
            Exchange-Backed Sources: Fuentes Respaldadas Por Exchanges
            Cross-Source Spread: Spread Entre Fuentes
            Reference: Referencia
            Lexical Structure: Estructura Lexica
            Grammar: Gramatica
            Declarations and Scope: Declaraciones y Alcance
            Types and Values: Tipos y Valores
            Series and Indexing: Series E Indexacion
            Evaluation Semantics: Semantica De Evaluacion
            Intervals and Sources: Intervalos y Fuentes
            Builtins: Builtins
            Indicators: Indicadores
            Trend and Overlap: Tendencia y Superposicion
            Momentum, Volume, and Volatility: Momentum, Volumen y Volatilidad
            Math, Price, and Statistics: Matematicas, Precio y Estadistica
            TA-Lib Surface: Superficie TA-Lib
            Outputs: Salidas
            Diagnostics: Diagnosticos
            Interval Table: Tabla De Intervalos
            Glossary: Glosario

nav:
  - Home: index.md
  - Learn:
      - Overview: learn/overview.md
      - Installation: learn/installation.md
      - Quickstart: learn/quickstart.md
      - First Strategy: learn/first-strategy.md
      - Language Overview: learn/language-overview.md
      - Cookbook:
          - Multi-Interval Strategy: learn/cookbook/multi-interval.md
          - Exchange-Backed Sources: learn/cookbook/exchange-backed-sources.md
          - Cross-Source Spread: learn/cookbook/cross-source-spread.md
  - Reference:
      - Overview: reference/overview.md
      - Lexical Structure: reference/lexical-structure.md
      - Grammar: reference/grammar.md
      - Declarations and Scope: reference/declarations-and-scope.md
      - Types and Values: reference/types-and-values.md
      - Series and Indexing: reference/series-and-indexing.md
      - Evaluation Semantics: reference/evaluation-semantics.md
      - Intervals and Sources: reference/intervals-and-sources.md
      - Builtins: reference/builtins.md
      - Indicators:
          - Overview: reference/indicators.md
          - Trend and Overlap: reference/indicators-trend-and-overlap.md
          - Momentum, Volume, and Volatility: reference/indicators-momentum-volume-volatility.md
          - Math, Price, and Statistics: reference/indicators-math-price-statistics.md
      - TA-Lib Surface: reference/ta-lib.md
      - Outputs: reference/outputs.md
      - Diagnostics: reference/diagnostics.md
      - Interval Table: reference/intervals.md
      - Glossary: reference/glossary.md
