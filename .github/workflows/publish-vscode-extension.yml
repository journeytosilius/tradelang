name: publish-vscode-extension

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-lsp:
    name: build-lsp-${{ matrix.platform_dir }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            rust_target: x86_64-unknown-linux-gnu
            platform_dir: linux-x64
            binary_name: palmscript-lsp
          - runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            platform_dir: darwin-x64
            binary_name: palmscript-lsp
          - runner: macos-14
            rust_target: aarch64-apple-darwin
            platform_dir: darwin-arm64
            binary_name: palmscript-lsp
          - runner: windows-latest
            rust_target: x86_64-pc-windows-msvc
            platform_dir: win32-x64
            binary_name: palmscript-lsp.exe

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Build palmscript-lsp
        run: cargo build --release --bin palmscript-lsp --target ${{ matrix.rust_target }}

      - name: Stage bundle
        shell: bash
        run: |
          mkdir -p bundle/${{ matrix.platform_dir }}
          cp target/${{ matrix.rust_target }}/release/${{ matrix.binary_name }} bundle/${{ matrix.platform_dir }}/${{ matrix.binary_name }}

      - uses: actions/upload-artifact@v4
        with:
          name: palmscript-lsp-${{ matrix.platform_dir }}
          path: bundle/${{ matrix.platform_dir }}/${{ matrix.binary_name }}

  package-extension:
    name: package-vsix
    runs-on: ubuntu-latest
    needs: build-lsp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - name: Download bundled language servers
        uses: actions/download-artifact@v4
        with:
          path: editors/vscode/server

      - name: Normalize artifact layout
        shell: bash
        run: |
          mkdir -p editors/vscode/server/linux-x64 editors/vscode/server/darwin-x64 editors/vscode/server/darwin-arm64 editors/vscode/server/win32-x64
          cp editors/vscode/server/palmscript-lsp-linux-x64/palmscript-lsp editors/vscode/server/linux-x64/palmscript-lsp
          cp editors/vscode/server/palmscript-lsp-darwin-x64/palmscript-lsp editors/vscode/server/darwin-x64/palmscript-lsp
          cp editors/vscode/server/palmscript-lsp-darwin-arm64/palmscript-lsp editors/vscode/server/darwin-arm64/palmscript-lsp
          cp editors/vscode/server/palmscript-lsp-win32-x64/palmscript-lsp.exe editors/vscode/server/win32-x64/palmscript-lsp.exe
          chmod +x editors/vscode/server/linux-x64/palmscript-lsp
          chmod +x editors/vscode/server/darwin-x64/palmscript-lsp
          chmod +x editors/vscode/server/darwin-arm64/palmscript-lsp

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Package VSIX
        working-directory: editors/vscode
        run: npm run package:vsix

      - uses: actions/upload-artifact@v4
        with:
          name: palmscript-vsix
          path: editors/vscode/*.vsix

  publish-extension:
    name: publish-vscode-marketplace
    runs-on: ubuntu-latest
    needs: package-extension
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - uses: actions/download-artifact@v4
        with:
          name: palmscript-vsix
          path: dist

      - name: Install extension dependencies
        working-directory: editors/vscode
        run: npm ci

      - name: Publish VSIX
        working-directory: editors/vscode
        run: npx @vscode/vsce publish --packagePath ../../dist/*.vsix --pat "$VSCE_PAT"
