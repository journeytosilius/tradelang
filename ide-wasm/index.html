<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PalmScript IDE</title>
    <style>
      html, body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #f4f8fc 0%, #edf4fb 100%);
      }

      body {
        position: relative;
      }

      .ide-brand-slot {
        position: fixed;
        top: 36px;
        left: 36px;
        z-index: 10;
        width: 184px;
        height: 40px;
        display: flex;
        align-items: center;
        overflow: hidden;
        pointer-events: none;
        user-select: none;
      }

      .ide-brandmark {
        max-width: 100%;
        max-height: 100%;
        width: 100%;
        height: 100%;
        object-fit: contain;
        object-position: left center;
        pointer-events: none;
        user-select: none;
      }

      @media (max-width: 900px) {
        .ide-brand-slot {
          top: 28px;
          left: 28px;
          width: 156px;
          height: 34px;
        }
      }
    </style>
  </head>
  <body>
    <div class="ide-brand-slot">
      <img class="ide-brandmark" src="./ide/palmscript-logo.png" alt="PalmScript" />
    </div>
    <script type="module">
      const assetVersion = "20260311-clipboard-preflight";
      const clipboardPreflightKey = `palmscript-ide-clipboard-preflight:${assetVersion}`;
      const clipboardPreflightTtlMs = 30 * 24 * 60 * 60 * 1000;

      function shouldPrimeClipboard() {
        try {
          const raw = window.localStorage.getItem(clipboardPreflightKey);
          if (!raw) {
            return true;
          }
          const parsed = JSON.parse(raw);
          if (!parsed || typeof parsed.attemptedAt !== "number") {
            return true;
          }
          return Date.now() - parsed.attemptedAt >= clipboardPreflightTtlMs;
        } catch {
          return true;
        }
      }

      function markClipboardPreflightAttempt() {
        try {
          window.localStorage.setItem(
            clipboardPreflightKey,
            JSON.stringify({ attemptedAt: Date.now() }),
          );
        } catch {
          // Ignore storage failures; the next load will retry the preflight.
        }
      }

      async function tryClipboardReadPreflight() {
        if (!navigator.clipboard?.readText) {
          return false;
        }
        try {
          await navigator.clipboard.readText();
          return true;
        } catch {
          return false;
        }
      }

      function scheduleClipboardInteractionPreflight() {
        let completed = false;

        const clear = () => {
          window.removeEventListener("pointerdown", run, true);
          window.removeEventListener("keydown", run, true);
        };

        const run = async () => {
          if (completed) {
            return;
          }
          completed = true;
          clear();
          await tryClipboardReadPreflight();
          markClipboardPreflightAttempt();
        };

        window.addEventListener("pointerdown", run, { capture: true, once: true });
        window.addEventListener("keydown", run, { capture: true, once: true });
      }

      async function primeClipboardAccess() {
        if (!shouldPrimeClipboard()) {
          return;
        }

        if (await tryClipboardReadPreflight()) {
          markClipboardPreflightAttempt();
          return;
        }

        scheduleClipboardInteractionPreflight();
      }

      const { default: init } = await import(`./ide/palmscript_ide.js?v=${assetVersion}`);

      void primeClipboardAccess();
      init(`./ide/palmscript_ide_bg.wasm?v=${assetVersion}`);
    </script>
  </body>
  </html>
