# Container defaults:
# - The image bundles example strategies at /usr/share/palmscript/strategies
# - Mount strategy files at /strategies to override or add custom scripts
# - Mount persistent session state at /var/lib/palmscript/execution
# - Override this file by mounting your own config at
#   /etc/palmscript/paper-sessions.toml

[daemon]
poll_interval_ms = 30000
once = false

[[session]]
enabled = true
script = "strategy.ps"

# Current validated paper target from /mnt/4tbscratch/projects/palmscript-build-futures:
# - execution alias: exec
# - symbol / segment: Binance USD-M BTCUSDT
# - exact validation artifact: opt_probe_iter52_cooldown1_exact.json

initial_capital = 10000.0
maker_fee_bps = 2.0
taker_fee_bps = 5.0
slippage_bps = 1.0
diagnostics = "summary"
leverage = 10
margin_mode = "isolated"

# Optional:
# execution_sources = ["exec"]
# fee_schedules = ["spot:1.0:3.0"]
