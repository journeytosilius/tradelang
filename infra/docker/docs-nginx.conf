server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location = / {
        return 404;
    }

    location = /docs {
        return 308 https://$host/docs/;
    }

    location = /es/docs {
        return 308 https://$host/es/docs/;
    }

    location = /pt-BR/docs {
        return 308 https://$host/pt-BR/docs/;
    }

    location = /app {
        return 308 https://$host/app/;
    }

    location /app/api/lsp {
        proxy_pass https://palmscript-ide-backend-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name palmscript-ide-backend-production.up.railway.app;
        proxy_set_header Host palmscript-ide-backend-production.up.railway.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /app/ {
        proxy_pass https://palmscript-ide-backend-production.up.railway.app;
        proxy_ssl_server_name on;
        proxy_ssl_name palmscript-ide-backend-production.up.railway.app;
        proxy_set_header Host palmscript-ide-backend-production.up.railway.app;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs/ {
        try_files $uri $uri/ $uri/index.html /docs/404.html;
    }

    location /es/docs/ {
        try_files $uri $uri/ $uri/index.html /es/docs/404.html;
    }

    location /pt-BR/docs/ {
        try_files $uri $uri/ $uri/index.html /pt-BR/docs/404.html;
    }
}
